name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: lint-pip-${{ runner.os }}-${{ hashFiles('**/pyproject.toml', '**/setup.cfg', '**/requirements*.txt') }}
          restore-keys: |
            lint-pip-${{ runner.os }}-

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check datasphere/

      - name: Syntax-check all Python files
        run: |
          find . -name "*.py" -not -path "./.git/*" -not -path "./build/*" | \
            xargs -I{} python -m py_compile {}

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: test-pip-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml', '**/setup.cfg', '**/requirements*.txt') }}
          restore-keys: |
            test-pip-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Install package with test extras
        run: pip install -e ".[api,test]"

      - name: Run pytest
        run: >
          python -m pytest tests/ -q --tb=short
          --cov=datasphere
          --cov-report=term-missing
          --cov-fail-under=60

  build:
    name: Docker Build & Smoke Test
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t datasphere/api:${{ github.sha }} .

      - name: Smoke-test Docker image
        run: |
          docker run --rm datasphere/api:${{ github.sha }} \
            python -c "from datasphere.api.app import app; print('OK')"
