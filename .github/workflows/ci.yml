name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: lint-pip-${{ runner.os }}-${{ hashFiles('**/pyproject.toml', '**/setup.cfg', '**/requirements*.txt') }}
          restore-keys: |
            lint-pip-${{ runner.os }}-

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check datasphere/

      - name: Syntax-check all Python files
        run: |
          find . -name "*.py" -not -path "./.git/*" -not -path "./build/*" | \
            xargs -I{} python -m py_compile {}

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: test-pip-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml', '**/setup.cfg', '**/requirements*.txt') }}
          restore-keys: |
            test-pip-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Install package with test extras
        run: pip install -e ".[api,test]"

      - name: Run pytest
        run: >
          python -m pytest tests/ -q --tb=short
          --cov=datasphere
          --cov-report=term-missing
          --cov-fail-under=60

  integration:
    name: Docker integration tests
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t datasphere:ci .

      - name: Start API container
        run: |
          docker run -d --name datasphere-ci \
            -p 18000:8000 \
            -e LOG_FORMAT=json \
            -e DATASPHERE_RATE_LIMIT_RPM=600 \
            datasphere:ci

      - name: Wait for healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:18000/readyz; then echo "API ready"; break; fi
            echo "Waiting... ($i/30)"; sleep 3
          done

      - name: Run smoke tests
        run: |
          chmod +x scripts/smoke_test.sh
          DATASPHERE_BASE_URL=http://localhost:18000 bash scripts/smoke_test.sh http://localhost:18000

      - name: Run integration test suite
        run: |
          pip install pytest
          DATASPHERE_BASE_URL=http://localhost:18000 python -m pytest tests/test_docker_integration.py -v

      - name: Stop container
        if: always()
        run: docker stop datasphere-ci && docker rm datasphere-ci

  build:
    name: Docker Build & Smoke Test
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t datasphere/api:${{ github.sha }} .

      - name: Smoke-test Docker image
        run: |
          docker run --rm datasphere/api:${{ github.sha }} \
            python -c "from datasphere.api.app import app; print('OK')"
