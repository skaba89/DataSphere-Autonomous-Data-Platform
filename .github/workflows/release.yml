name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: skaba89/datasphere-autonomous-data-platform

jobs:
  docker-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm-package:
    name: Package & Upload Helm Chart
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: release-pip-${{ runner.os }}-${{ hashFiles('**/pyproject.toml', '**/setup.cfg', '**/requirements*.txt') }}
          restore-keys: |
            release-pip-${{ runner.os }}-

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "latest"

      - name: Package Helm chart
        run: helm package infra/helm/datasphere

      - name: Determine artifact name
        id: chart
        run: echo "tgz=$(ls datasphere-*.tgz | head -n1)" >> "$GITHUB_OUTPUT"

      - name: Upload chart as release artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: ${{ steps.chart.outputs.tgz }}
          retention-days: 30

      - name: Attach chart to GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.chart.outputs.tgz }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
