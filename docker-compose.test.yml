# Integration tests against the built Docker image
services:
  api-test:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - LOG_FORMAT=json
      - LOG_LEVEL=INFO
      - DATASPHERE_RATE_LIMIT_RPM=600  # high limit for tests
    ports:
      - "18000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/readyz')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
