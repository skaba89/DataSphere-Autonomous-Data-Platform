version: '3.9'

services:
  airflow-webserver:
    image: apache/airflow:2.8.0
    profiles: ["airflow"]
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgresql/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:?AIRFLOW_SECRET_KEY required}
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
    command: webserver
    depends_on:
      postgresql:
        condition: service_healthy
    restart: unless-stopped

  airflow-scheduler:
    image: apache/airflow:2.8.0
    profiles: ["airflow"]
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgresql/airflow
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
    command: scheduler
    depends_on:
      postgresql:
        condition: service_healthy
    restart: unless-stopped

  dagster-webserver:
    image: ghcr.io/dagster-io/dagster:latest
    profiles: ["dagster"]
    ports:
      - "3000:3000"
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home
    volumes:
      - dagster_home:/opt/dagster/dagster_home

  prefect-server:
    image: prefecthq/prefect:2-latest
    profiles: ["prefect"]
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgresql/prefect
    depends_on:
      postgresql:
        condition: service_healthy

volumes:
  dagster_home:
