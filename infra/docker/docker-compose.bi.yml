version: '3.9'

services:
  superset:
    image: apache/superset:latest
    profiles: ["superset"]
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:?SUPERSET_SECRET_KEY required}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgresql/superset
    depends_on:
      postgresql:
        condition: service_healthy
    command: >
      sh -c "superset db upgrade &&
             superset fab create-admin --username ${SUPERSET_USER:-admin} --firstname Admin --lastname User --email admin@example.com --password ${SUPERSET_PASSWORD:-admin} &&
             superset init &&
             superset run -h 0.0.0.0 -p 8088"
    volumes:
      - superset_data:/app/superset_home

  metabase:
    image: metabase/metabase:latest
    profiles: ["metabase"]
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: ${POSTGRES_USER}
      MB_DB_PASS: ${POSTGRES_PASSWORD}
      MB_DB_HOST: postgresql
    depends_on:
      postgresql:
        condition: service_healthy
    volumes:
      - metabase_data:/metabase-data

volumes:
  superset_data:
  metabase_data:
