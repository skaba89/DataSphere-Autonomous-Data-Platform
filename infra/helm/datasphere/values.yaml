global:
  imageRegistry: "ghcr.io/skaba89"
  storageClass: ""
  imagePullSecrets: []

# ---------------------------------------------------------------------------
# DataSphere API
# ---------------------------------------------------------------------------
api:
  enabled: true
  replicaCount: 1
  image:
    repository: datasphere/api
    pullPolicy: IfNotPresent
    # tag defaults to Chart.appVersion
    tag: ""
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 1Gi
  env:
    LOG_FORMAT: "json"
    LOG_LEVEL: "INFO"
    DATASPHERE_RATE_LIMIT_RPM: "60"
  # Set via --set api.apiKey=<value> or a secret
  apiKey: ""
  corsOrigins: ""
  # Path for SQLite job store (if not using Redis)
  jobDbPath: "/data/jobs.db"
  persistence:
    enabled: true
    size: 1Gi
    storageClass: ""

# ---------------------------------------------------------------------------
# Platform metadata
# ---------------------------------------------------------------------------
platform:
  name: datasphere
  environment: production
  replicaCount: 1

# ---------------------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------------------
ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: datasphere.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

# ---------------------------------------------------------------------------
# Optional data services
# ---------------------------------------------------------------------------
postgresql:
  enabled: true
  auth:
    database: datasphere
    username: datasphere
    existingSecret: datasphere-postgresql-secret
  primary:
    persistence:
      size: 20Gi

minio:
  enabled: true
  auth:
    existingSecret: datasphere-minio-secret
  persistence:
    size: 50Gi

airflow:
  enabled: false
  executor: KubernetesExecutor
  dags:
    persistence:
      enabled: true
      size: 5Gi

superset:
  enabled: false
  extraEnv:
    SUPERSET_SECRET_KEY:
      valueFrom:
        secretKeyRef:
          name: datasphere-superset-secret
          key: secret-key

qdrant:
  enabled: false
  persistence:
    size: 10Gi

vault:
  enabled: false
  server:
    dev:
      enabled: false
    ha:
      enabled: true
      replicas: 3

prometheus:
  enabled: true
  server:
    persistentVolume:
      size: 20Gi

grafana:
  enabled: true
  adminPassword: ""
  persistence:
    enabled: true
    size: 5Gi
